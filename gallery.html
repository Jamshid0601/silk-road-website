    <main>
        <header>
            <h1>Ancient Wonders of the Silk Road</h1>
        </header>

        <section class="gallery-grid">
            <figure>
                <img src="images/Registan%20Square.jpg" alt="Registan Square">
                <figcaption><strong>Registan Square</strong><br>The public square and heart of the ancient city of Samarkand, framed by three distinct madrasahs.</figcaption>
            </figure>
            <figure>
                <img src="images/Shah-i-Zinda.jpg" alt="Shah-i-Zinda">
                <figcaption><strong>Shah-i-Zinda</strong><br>A stunning necropolis in Samarkand featuring incredibly preserved blue tilework from the 11th to 19th centuries.</figcaption>
            </figure>
            <figure>
                <img src="images/Kalon%20Minaret.jpg" alt="Kalon Minaret">
                <figcaption><strong>Kalon Minaret</strong><br>Built in 1127 in Bukhara, this minaret was so beautiful that Genghis Khan allegedly spared it from destruction.</figcaption>
            </figure>
            <figure>
                <img src="images/Ark%20Fortress.jpg" alt="Ark Fortress">
                <figcaption><strong>Ark Fortress</strong><br>A massive 5th-century fortress in Bukhara that functioned as a city within a city for the Emirs.</figcaption>
            </figure>
            <figure>
                <img src="images/Itchan%20Kala.jpg" alt="Itchan Kala">
                <figcaption><strong>Itchan Kala</strong><br>The walled inner town of the city of Khiva, acting as an open-air museum of ancient Islamic architecture.</figcaption>
            </figure>
            <figure>
                <img src="images/Guri%20Amir.jpg" alt="Guri Amir">
                <figcaption><strong>Guri Amir</strong><br>The mausoleum of the Asian conqueror Timur (Tamerlane), heavily influencing later Mughal architecture like the Taj Mahal.</figcaption>
            </figure>
        </section>
